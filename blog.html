<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog · Ronnie Wong</title>
    <meta
      name="description"
      content="Ronnie Wong 的 Blog，整理產品工程、Apple 平台、AI workflow 和設計判斷的公開筆記。"
    >
    <link rel="canonical" href="https://ronniewong.cc/blog.html">
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script>
      const themeMode = ["auto", "light", "dark"].includes(localStorage.getItem("theme"))
        ? localStorage.getItem("theme")
        : "auto";
      document.documentElement.dataset.themeMode = themeMode;
      document.documentElement.dataset.theme =
        themeMode === "auto"
          ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : themeMode;
      document.documentElement.dataset.language = localStorage.getItem("site-language") || "mix";
    </script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="blog">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Ronnie Wong home">
        <span class="brand-mark">RW</span>
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="index.html">Index</a>
        <a href="projects.html">Projects</a>
        <a aria-current="page" href="blog.html">Blog</a>
        <a href="resume.html">Resume</a>
      </nav>
      <button class="language-toggle" type="button" aria-label="Switch language" data-language-toggle>EN</button>
      <button class="theme-toggle" type="button" aria-label="Change color mode" data-theme-toggle>
        <span aria-hidden="true"></span>
      </button>
    </header>

    <main>
      <section class="page-hero compact" aria-labelledby="blog-title">
        <p class="eyebrow">Writing index</p>
        <h1 id="blog-title">Blog</h1>
        <p>
          一組公開筆記，用來保留產品工程、Apple 平台、AI workflow 和設計判斷的上下文。
        </p>
      </section>

      <section class="section blog-board" aria-labelledby="blog-list-title">
        <div class="section-header">
          <p class="eyebrow">Notion source</p>
          <h2 id="blog-list-title">Published notes</h2>
        </div>
        <div class="blog-list" id="blog-list" aria-live="polite"></div>
      </section>
    </main>

    <footer class="footer">
      <span>Ronnie Wong</span>
      <nav class="footer-links" aria-label="Footer links">
        <a href="https://x.com/llqoli">X</a>
        <a href="https://mastodon.social/@ronniew">Mastodon</a>
        <a href="https://github.com/qoli/RonnieCC">GitHub</a>
      </nav>
    </footer>

    <script src="site.js" defer></script>
  </body>
</html>
