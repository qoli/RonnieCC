name: Sync Notion Blog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  sync-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync blog data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TOKEN_V2: ${{ secrets.NOTION_TOKEN_V2 }}
        run: node scripts/sync-blog.mjs

      - name: Commit updated blog data
        run: |
          if git diff --quiet -- content/blog.seed.json; then
            echo "No blog data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog.seed.json
          git commit -m "Sync Notion blog data"
          git push
