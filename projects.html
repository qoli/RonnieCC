<!doctype html>

    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script>
      const themeMode = ["auto", "light", "dark"].includes(localStorage.getItem("theme"))
        ? localStorage.getItem("theme")
        : "auto";
      document.documentElement.dataset.themeMode = themeMode;
      document.documentElement.dataset.theme =
        themeMode === "auto"
          ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : themeMode;
      document.documentElement.dataset.language = localStorage.getItem("site-language") || "mix";
    </script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="projects">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Ronnie Wong home">
        <span class="brand-mark">RW</span>
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="index.html">Index</a>
        <a aria-current="page" href="projects.html">Projects</a>
        <a href="blog.html">Blog</a>
        <a href="resume.html">Resume</a>
      </nav>
      <button class="language-toggle" type="button" aria-label="Switch language" data-language-toggle>EN</button>

      <section class="page-hero compact" aria-labelledby="projects-title">
        <p class="eyebrow">Project ecosystems</p>

        </p>
      </section>

      <section class="section project-board" aria-label="Project filters">
        <div class="filters">
          <button class="filter is-active" type="button" data-filter="all">All</button>
          <button class="filter" type="button" data-filter="current">現在</button>
          <button class="filter" type="button" data-filter="exploration">探索</button>
          <button class="filter" type="button" data-filter="history">歷史</button>
        </div>
        <div class="grouped-projects" id="project-groups" aria-live="polite"></div>
      </section>

    <footer class="footer">
